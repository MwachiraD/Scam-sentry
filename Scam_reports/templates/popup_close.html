{% extends 'base.html' %}

{% block title %}Login Successful{% endblock %}

{% block content %}
<div class="text-center py-4">
  <div class="card p-4 reveal">
    <h2>Login successful</h2>
    <p class="text-muted">You can close this window.</p>
  </div>
</div>

<script nonce="{{ CSP_NONCE }}">
  try {
    localStorage.setItem("google_login_done", "true");
  } catch (e) {
    console.log("localStorage error:", e);
  }

  setTimeout(() => {
    window.close();
  }, 500);
  localStorage.removeItem("google_login_done");
</script>
{% endblock %}
