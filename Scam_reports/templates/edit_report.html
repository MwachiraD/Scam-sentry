{% extends 'base.html' %}
{% block title %}Edit Report{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card p-4 reveal">
      <h2>Edit Scam Report</h2>
      <p class="text-muted">Update your report details.</p>
      <form method="POST" class="styled-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-accent">Save Changes</button>
        <a href="{% url 'user_dashboard' %}" class="btn btn-outline-dark ms-2">Cancel</a>
      </form>
    </div>
  </div>
</div>

<script>
  document.querySelectorAll(".styled-form input, .styled-form textarea, .styled-form select").forEach((el) => {
    el.classList.add("form-control");
  });
</script>
{% endblock %}
