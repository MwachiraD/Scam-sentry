{% extends 'base.html' %}

{% block title %}Link Invalid{% endblock %}

{% block content %}
<div class="text-center py-4">
  <div class="card p-4 reveal">
    <h2>Confirmation link invalid</h2>
    <p class="text-muted">This {{ verification_target }} confirmation link is missing, expired, or already used.</p>
    <a href="{% url 'report_list' %}" class="btn btn-outline-dark">Back to Reports</a>
  </div>
</div>
{% endblock %}
