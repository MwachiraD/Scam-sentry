{% extends 'base.html' %}

{% block title %}Logged Out{% endblock %}

{% block content %}
<div class="text-center py-4">
  <div class="card p-4 reveal">
    <h2>You have been logged out</h2>
    <p class="text-muted">Redirecting you to the homepage...</p>
    <a href="{% url 'report_scam' %}" class="btn btn-accent mt-2">Go now</a>
  </div>
</div>

<script nonce="{{ CSP_NONCE }}">
  setTimeout(() => {
    window.location.href = "{% url 'report_scam' %}";
  }, 1500);
</script>
{% endblock %}
