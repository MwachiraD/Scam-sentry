{% extends 'base.html' %}

{% block title %}Too Many Requests{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card p-4 reveal text-center">
      <h2 class="mb-2">Too many requests</h2>
      <p class="text-muted">That action is being throttled. Wait a bit and try again.</p>
      <a href="{% url 'report_list' %}" class="btn btn-outline-dark mt-2">Back to Reports</a>
    </div>
  </div>
</div>
{% endblock %}
